name: Build EtherX Mobile (Gitea)

on:
  push:
    branches: [main, develop, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    container:
      image: reactnativecommunity/react-native-android:latest
      options: --user root
    steps:
      - name: 📥 Checkout code
        uses: https://github.com/actions/checkout@v4

      - name: 📦 Install Node dependencies
        run: npm ci

      - name: 🔑 Generate debug keystore
        run: |
          mkdir -p android/app
          cd android/app
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=EtherX Debug,O=kriptoentuzijasti,C=HR"

      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🤖 Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode=all

      - name: 📤 Upload APK artifact
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: etherx-mobile-android
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: 🍎 iOS IPA (iPhone + iPad)
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout code
        uses: https://github.com/actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: https://github.com/actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: 📦 Install Node dependencies
        run: npm ci

      - name: 💎 Setup Ruby
        uses: https://github.com/ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: 🌫 Install CocoaPods
        run: |
          cd ios
          bundle exec pod install
        env:
          NO_FLIPPER: 1

      - name: 🏗️ Build iOS Archive (Universal - iPhone + iPad)
        run: |
          cd ios
          xcodebuild archive \
            -workspace EtherXMobile.xcworkspace \
            -scheme EtherXMobile \
            -configuration Release \
            -archivePath "$PWD/build/EtherXMobile.xcarchive" \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            TARGETED_DEVICE_FAMILY="1,2" \
            | xcpretty || true

      - name: 📦 Create IPA from archive
        run: |
          mkdir -p ios/build/ipa
          cp -r ios/build/EtherXMobile.xcarchive/Products/Applications/EtherXMobile.app \
                ios/build/ipa/
          cd ios/build/ipa
          mkdir Payload
          mv EtherXMobile.app Payload/
          zip -r EtherXMobile-universal.ipa Payload/
          mv EtherXMobile-universal.ipa ../

      - name: 📤 Upload iOS IPA artifact
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: etherx-mobile-ios-universal
          path: ios/build/EtherXMobile-universal.ipa
          if-no-files-found: warn
          retention-days: 30
