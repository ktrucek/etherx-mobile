name: Build EtherX Mobile (Gitea)

on:
  push:
    branches: [main, develop, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    name: 🤖 Android (APK)
    runs-on: ubuntu-latest
    container:
      image: node:18
    steps:
      - name: 📥 Checkout code
        uses: https://github.com/actions/checkout@v4

      - name: ☕ Install Java 17
        run: |
          apt-get update
          apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: 📦 Install Node dependencies
        run: npm ci

      - name: 🔑 Generate debug keystore
        run: |
          cd android/app
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=EtherX Debug,O=kriptoentuzijasti,C=HR"

      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🤖 Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 📤 Upload APK artifact
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  build-info:
    name: 📋 Build Info
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always()
    container:
      image: alpine:latest
    steps:
      - name: 📥 Download Android APK
        if: needs.build-android.result == 'success'
        uses: https://github.com/actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: 📊 Show build summary
        run: |
          echo "## 📱 EtherX Mobile Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f artifacts/app-release.apk ]; then
            SIZE=$(du -h artifacts/app-release.apk | cut -f1)
            echo "✅ **Android APK**: Built successfully ($SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Android APK**: Build failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔖 **Version**: ${GITHUB_REF_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Commit**: ${GITHUB_SHA:0:8}" >> $GITHUB_STEP_SUMMARY
